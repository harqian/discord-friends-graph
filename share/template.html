<!DOCTYPE html>
<!--
  Discord Lattice share page (shareEnvelopeV1).
  Fully self-contained: vis-network + viewer code + graph data inlined.
  Project: https://github.com/Moonflower2022/discord-lattice
  Schema:  lib/share-envelope.md in the project repo.
  To merge this page with your own scan, install the extension and click
  its toolbar icon while this page is the active tab.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>__SHARE_TITLE__</title>
<meta name="generator" content="Discord Lattice share v1">
<meta name="discord-lattice-schema-version" content="1">
<style>/*__VIEWER_CSS__*/</style>
</head>
<body>
<div id="lattice-root">
  <div id="loading" role="status" aria-live="polite">
    <div id="loading-text">Loading graph...</div>
  </div>
  <div id="network"></div>
  <div id="search-hints">
    <kbd>/</kbd>or
    <span style="margin-left: 3px;"><kbd>&#8984;</kbd><kbd>K</kbd>Search</span>
  </div>
  <div id="provenance-legend" hidden>
    <div class="legend-row"><span class="legend-swatch swatch-both"></span> seen by both</div>
    <div class="legend-row"><span class="legend-swatch swatch-owner"></span> owner only</div>
    <div class="legend-row"><span class="legend-swatch swatch-visitor"></span> visitor only</div>
  </div>
  <div id="search-overlay" aria-hidden="true">
    <div id="search-modal" role="dialog" aria-label="Search friends">
      <input id="search-input" type="text" autocomplete="off" spellcheck="false" placeholder="Search by name">
      <ul id="search-results" role="listbox"></ul>
      <div id="search-empty">No matches.</div>
    </div>
  </div>
  <div id="info-card">
    <button class="close">&times;</button>
    <div id="card-selection-title"></div>
    <div id="card-profiles"></div>
  </div>
  <div id="lattice-toolbar" aria-hidden="false">
    <button id="lattice-btn-open" class="lattice-tool-btn" type="button" title="Open in new tab" hidden>&#8599;</button>
    <button id="lattice-btn-download" class="lattice-tool-btn" type="button" title="Download this graph as .html">&#8615;</button>
    <button id="lattice-btn-copy" class="lattice-tool-btn" type="button" title="Copy embed code">&#9112;</button>
    <span id="lattice-toolbar-toast" aria-live="polite"></span>
  </div>
  <div id="lattice-watermark">
    <a href="https://chromewebstore.google.com/detail/discord-friends-graph/bibbabmjfhdenaiccjdhecphakgcinag" target="_blank" rel="noopener noreferrer" title="Install Discord Friends Graph from the Chrome Web Store">
      <span class="watermark-text">made with <b>Discord Friends Graph</b></span>
      <span class="watermark-arrow" aria-hidden="true">&#8599;</span>
    </a>
  </div>
</div>
<script type="application/json" id="lattice-share-data">/*__SHARE_ENVELOPE_JSON__*/</script>
<script>/*__VIEWER_BOOTSTRAP_JS__*/</script>
<script>/*__VIS_NETWORK_JS__*/</script>
<script>/*__GRAPH_JS__*/</script>
</body>
</html>
